name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check code formatting
        run: npm run format:check

  security:
    name: Security Scan (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: semgrep scan --config auto --error --exclude='**/node_modules/**' --exclude='**/dist/**' --exclude='**/*.test.ts' --exclude='**/*.integration.test.ts'

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage/
            packages/*/coverage/
          retention-days: 7

  integration-test:
    name: Integration Tests (DynamoDB Local)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Repository integration tests spin up `amazon/dynamodb-local` via
      # Testcontainers. The ubuntu-latest runner has a Docker daemon
      # preinstalled, so no services/dind setup is required (unlike GitLab).
      # Each command is scoped so the agent package's real-AWS integration
      # tests (which self-gate on credentials) are NOT pulled in:
      #   - backend: test:integration runs only repositories/**.integration
      #   - agent:   test:ddb runs only the DynamoDB-Local repository tests
      #              (test:integration there is the separate real-AWS suite)
      - name: Run backend integration tests
        run: npm run test:integration -w @moca/backend

      - name: Run agent DynamoDB Local tests
        run: npm run test:ddb -w @moca/agent

  ash:
    name: Security Scan (ASH)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Run ASH
        run: uvx 'git+https://github.com/awslabs/automated-security-helper.git@v3.1.5'

      # TEMPORARY DIAGNOSTIC: print the exact rule_id + location.uri ASH matches
      # suppressions against, so the suppression globs can be aligned to the
      # real CI finding paths. Remove once ASH is green.
      - name: Debug — dump ASH finding rule_id/path
        if: always()
        run: |
          echo "=== npm-audit SARIF locations ==="
          find .ash/ash_output -path '*npm-audit*' -name '*.sarif' -exec sh -c '
            python3 -c "
import json,sys
d=json.load(open(\"$1\"))
for run in d.get(\"runs\",[]):
    for r in run.get(\"results\",[]):
        locs=[l.get(\"physicalLocation\",{}).get(\"artifactLocation\",{}).get(\"uri\") for l in r.get(\"locations\",[])]
        print(repr(r.get(\"ruleId\")), \"|\", locs)
"' _ {} \;
          echo "=== aggregated/OCSF findings (rule_id + file_path) ==="
          find .ash/ash_output -name '*.json' | while read f; do
            python3 -c "
import json,sys
try:
    d=json.load(open('$f'))
except Exception:
    sys.exit(0)
def walk(o):
    if isinstance(o,dict):
        rid=o.get('rule_id') or o.get('ruleId')
        fp=o.get('file_path') or o.get('path')
        if rid and ('GHSA' in str(rid) or 'q7rr' in str(rid) or 'jxxr' in str(rid)):
            print('$f', '::', repr(rid), '|', repr(fp))
        for v in o.values(): walk(v)
    elif isinstance(o,list):
        for v in o: walk(v)
walk(d)
" 2>/dev/null
          done | sort -u

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build
