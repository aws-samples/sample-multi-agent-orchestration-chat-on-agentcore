stages:
  - lint
  - security
  - test
  - build
  - deploy

# Common template for Node.js jobs
.node_template: &node_template
  image: node:22
  variables:
    NODE_OPTIONS: '--max-old-space-size=4096'
    npm_config_cache: '$CI_PROJECT_DIR/.npm-cache'
  cache:
    key: npm-cache
    paths:
      - node_modules/
      - packages/*/node_modules/
      - .npm-cache/
  before_script:
    - npm ci --prefer-offline --no-audit || (npm cache clean --force && npm ci --no-audit)

# ========================================
# LINT STAGE
# ========================================

lint:check:
  <<: *node_template
  stage: lint
  script:
    - npm run lint
    - npm run format:check
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ========================================
# SECURITY STAGE
# ========================================

security:ash:
  stage: lint
  image: python:3.12-slim
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git
    - pip install uv
  script:
    - uvx 'git+https://github.com/awslabs/automated-security-helper.git@v3.1.5'
  artifacts:
    when: always
    paths:
      - .ash/ash_output/
    reports:
      sast: .ash/ash_output/reports/ash.gl-sast-report.json
    expire_in: 1 week
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ========================================
# TEST STAGE
# ========================================

test:workspaces:
  <<: *node_template
  stage: test
  script:
    - npm run build:ts
    - npm run test --workspaces --if-present
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# L2 integration tests: exercise the DynamoDB data-access layer against a real
# DynamoDB Local container started by Testcontainers. Requires a Docker daemon,
# so this job runs under Docker-in-Docker rather than the plain node template.
#
# Testcontainers maps published ports on the dind host; TESTCONTAINERS_HOST_OVERRIDE
# tells the test process to reach those mapped ports via the `docker` service
# hostname instead of localhost.
test:integration:
  stage: test
  image: node:22
  services:
    - docker:dind
  variables:
    DOCKER_HOST: 'tcp://docker:2375'
    DOCKER_TLS_CERTDIR: ''
    TESTCONTAINERS_HOST_OVERRIDE: 'docker'
    TESTCONTAINERS_RYUK_DISABLED: 'true'
    NODE_OPTIONS: '--max-old-space-size=4096'
    npm_config_cache: '$CI_PROJECT_DIR/.npm-cache'
  cache:
    key: npm-cache
    paths:
      - node_modules/
      - packages/*/node_modules/
      - .npm-cache/
  before_script:
    - npm ci --prefer-offline --no-audit || (npm cache clean --force && npm ci --no-audit)
  script:
    - npm run build:ts
    - npm run test:integration:coverage -w @moca/backend
    - npm run test:ddb:coverage -w @moca/agent
  artifacts:
    when: always
    paths:
      # DDB-Local integration coverage, merged into the repo-wide report by
      # the coverage:report job (which `needs:` this job's artifacts).
      - packages/*/coverage-integration/
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Repo-wide test coverage: run each workspace's `test:coverage` (Jest or
# Vitest, both via the v8 provider), pull the DDB-Local integration coverage
# produced by the test:integration job, and merge everything into a single
# lcov/cobertura/HTML report. This is measurement-and-visualisation only —
# no threshold gate yet.
coverage:report:
  <<: *node_template
  stage: test
  # Pull packages/*/coverage-integration/ from the dind job so the merge step
  # combines unit + integration coverage. optional:true keeps this job green
  # even if the integration job is skipped, falling back to unit-only.
  needs:
    - job: test:integration
      artifacts: true
      optional: true
  script:
    - npm run coverage
  coverage: '/Statements\s*:\s*([\d.]+)%/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths:
      - coverage/
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ========================================
# BUILD STAGE
# ========================================
build:packages:
  <<: *node_template
  stage: build
  script:
    - npm run build
  artifacts:
    paths:
      - packages/*/dist/
      - packages/libs/*/dist/
      - packages/lambda-tools/shared/dist/
      - packages/*/build/
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

